apis:
- aid: quiz-api:quiz-api
  name: QuizAPI
  description: The QuizAPI REST API exposes endpoints for browsing categories and metadata, searching and creating quizzes,
    retrieving quiz details, listing questions, and batch-importing questions into a quiz. Authentication is performed with
    a Bearer API key issued from quizapi.io. Responses are JSON with a consistent `data` and `meta` envelope and support standard
    pagination.
